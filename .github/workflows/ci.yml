# .github/workflows/ci.yml
#
# Continuous integration pipeline for most-active-cookie.
# Runs on every push and pull request to the main branch.
#
# Steps:
#   Test: pytest runs the full test suite of both unit and integration tests

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v